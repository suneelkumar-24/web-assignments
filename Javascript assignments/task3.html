<!DOCTYPE html>
<html>
<head>
    <title>Color Changer</title>
</head>
<body id="body">

    <h2>Background Color Changer</h2>

    <button onclick="changeColor()">Change Color</button>

<script>

function changeColor() {
    document.getElementById("body").style.backgroundColor = "yellow";
}

</script>

</body>
</html>
