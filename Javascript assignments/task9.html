<!DOCTYPE html>
<html>
<head>
    <title>Password Toggle</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
            text-align: center;
        }
        .card {
            width: 300px;
            margin: 100px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }
        input {
            width: 90%;
            padding: 10px;
            margin: 10px;
        }
        button {
            padding: 10px 15px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Password Toggle</h2>
    <input type="password" id="pass">
    <br>
    <button onclick="toggle()">Show/Hide</button>
</div>

<script>
function toggle() {
    let p = document.getElementById("pass");
    if (p.type == "password") {
        p.type = "text";
    } else {
        p.type = "password";
    }
}
</script>

</body>
</html>
