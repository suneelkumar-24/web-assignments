<!DOCTYPE html>
<html>
<head>
    <title>Business Card</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }
        .business-card {
            width: 300px;
            height: 180px;
            background: linear-gradient(to right, #4b6cb7, #182848);
            color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .name {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .title {
            font-size: 16px;
            opacity: 0.8;
            margin-bottom: 20px;
        }
        .contact {
            font-size: 14px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="business-card">
        <div class="name">Sarah Johnson</div>
        <div class="title">Web Designer</div>
        <div class="contact">
            <div>email: sarah@example.com</div>
            <div>phone: (123) 456-7890</div>
        </div>
    </div>
</body>
</html>
