<!DOCTYPE html>
<html>
<head>
  <title>Inline Inputs</title>
</head>
<body>
  <form>
    <input type="text" placeholder="First Name" style="display:inline;">
    <input type="text" placeholder="Last Name" style="display:inline;">
    <br><br>
    <input type="text" placeholder="City" style="display:block;">
  </form>
</body>
</html>
