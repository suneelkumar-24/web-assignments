<!DOCTYPE html>
<html>
<head>
  <title>Text Formatting</title>
</head>
<body>
  <p>This is <b>bold</b>, <i>italic</i>, and <mark>highlighted</mark> text.</p>
  <p>H<sub>2</sub>O and X<sup>2</sup> demonstrate <sub>subscript</sub> and <sup>superscript</sup>.</p>
  <p>This is <strong>strong</strong>, <em>emphasized</em>, <del>deleted</del>, <ins>inserted</ins>, and <small>small</small> text.</p>
</body>
</html>
