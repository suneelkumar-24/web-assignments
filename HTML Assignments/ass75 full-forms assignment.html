<!DOCTYPE html>
<html>
<head>
  <title>Styled Form</title>
  <style>
    #formWrap {
      border: 2px solid black;
      padding: 20px;
      font-family: Arial;
      background-color: #eee;
    }
  </style>
</head>
<body>
  <form id="formWrap">
    <label for="email">Email:</label><br>
    <input type="email" id="email"><br><br>

    <label for="pwd">Password:</label><br>
    <input type="password" id="pwd">
  </form>
</body>
</html>
