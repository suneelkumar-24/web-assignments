<!DOCTYPE html>
<html>
<head>
    <title>My Hobbies</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: #fff5e6;
            padding: 20px;
        }
        h1 {
            color: #ff6b6b;
            text-align: center;
        }
        ul {
            list-style: none;
            padding: 0;
            width: 200px;
            margin: 0 auto;
        }
        li {
            background: #ffddd2;
            margin: 5px 0;
            padding: 10px;
            border-left: 4px solid #ff6b6b;
            transition: 0.2s;
        }
        li:hover {
            background: #ffb4a2;
            transform: translateX(15px);
        }
    </style>
</head>
<body>
    <h1>My Hobbies</h1>
    <ul>
        <li>Reading</li>
        <li>Gaming</li>
        <li>Hiking</li>
    </ul>
</body>
</html>
