<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Landing Page Header</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        .hero-section {
            height: 100vh;
            background: #f8f9fa;
        }
    </style>
</head>

<body>
    <section class="hero-section d-flex align-items-center">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-6 text-center text-md-start">
                    <h1 class="display-5 fw-bold">Welcome to Our Website</h1>
                    <p class="lead">
                        We provide amazing solutions to help you grow your business online.
                    </p>
                    <a href="#" class="btn btn-primary btn-lg rounded-pill px-4">Get Started</a
            >
          </div>
          <div class="col-md-6 text-center mt-4 mt-md-0">
            <img
              src="img.jpg"
              alt="Hero Image"
              class="img-fluid rounded shadow"
            />
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
