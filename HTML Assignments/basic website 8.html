<!DOCTYPE html>
<html>

<head>
    <title>Restaurant</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            background-color: #f8f8f8;
        }

        h1 {
            color: darkred;
            font-size: 40px;
        }

        h2 {
            color: brown;
        }

        table,
        th,
        td {
            border: 1px solid black;
        }

        th {
            background-color: #ffcccc;
        }

        td {
            background-color: #fff0f0;
        }

        button {
            background-color: darkred;
            color: white;
            border: 1px solid black;
        }
    </style>
</head>

<body>
    <h1>🍴 My Restaurant</h1>
    <h2>Menu</h2>
    <table align="center">
        <tr>
            <th>Item</th>
            <th>Price</th>
        </tr>
        <tr>
            <td>Pizza</td>
            <td>$10</td>
        </tr>
        <tr>
            <td>Burger</td>
            <td>$6</td>
        </tr>
        <tr>
            <td>Pasta</td>
            <td>$8</td>
        </tr>
    </table><br>
    <button>Order Now</button>
</body>

</html>
