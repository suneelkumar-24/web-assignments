<!DOCTYPE html>
<html>
<head>
  <title>Box Styling</title>
  <style>
    #box1 {
      background-color: lightblue;
      padding: 15px;
      border: 2px solid navy;
    }

    #box2 {
      background-color: lightgreen;
      padding: 15px;
      border: 2px dashed green;
    }
  </style>
</head>
<body>
  <div id="box1">
    <h2>Box One</h2>
    <p>This box is styled uniquely using ID.</p>
  </div>

  <div id="box2">
    <h2>Box Two</h2>
    <p>This is another styled box with different border.</p>
  </div>
</body>
</html>
