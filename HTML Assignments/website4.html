<!DOCTYPE html>
<html>
<head>
  <title>Simple News</title>
  <style>
    body {
      font-family: Georgia, serif;
      background: #f4f4f4;
      margin: 0;
    }

    header {
      background: #2c3e50;
      color: white;
      padding: 20px;
      text-align: center;
    }

    article {
      background: white;
      max-width: 800px;
      margin: 30px auto;
      padding: 20px;
      box-shadow: 0 0 5px #aaa;
    }

    img {
      width: 100%;
      height: auto;
    }

    h1 {
      color: #2c3e50;
    }
  </style>
</head>
<body>

  <header>
    <h1>Daily News</h1>
    <p>Your trusted source of news</p>
  </header>

  <article>
    <h1>Breaking: Technology Takes Over</h1>
    <img src="tech.jpg" alt="Tech Image">
    <p><strong>Date:</strong> July 18, 2025</p>
    <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Tech is growing rapidly. More updates coming soon.</p>
  </article>

</body>
</html>
