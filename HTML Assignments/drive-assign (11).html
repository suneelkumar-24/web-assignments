<!DOCTYPE html>
<html>
<head>
  <title>Student Table</title>
  <style>
    table {
      border-collapse: collapse;
      width: 50%;
    }
    th, td {
      border: 1px solid black;
      padding: 8px;
    }
    th {
      background-color: lightgray;
    }
  </style>
</head>
<body>
  <h2>Student Information</h2>
  <table>
    <tr>
      <th>Name</th>
      <th>Class</th>
    </tr>
    <tr>
      <td>Ali</td>
      <td>10th</td>
    </tr>
    <tr>
      <td>Ayesha</td>
      <td>9th</td>
    </tr>
  </table>
</body>
</html>
