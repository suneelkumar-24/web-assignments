<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Portfolio</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f9f9f9;
    }

    header {
      background-color: #333;
      color: white;
      padding: 20px;
      text-align: center;
    }

    nav {
      background-color: #444;
      padding: 10px;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
    }

    .about, .projects, footer {
      padding: 30px;
      text-align: center;
    }

    .cards {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .card {
      background: white;
      padding: 15px;
      width: 250px;
      border: 1px solid #ccc;
      border-radius: 10px;
    }

    footer {
      background: #333;
      color: white;
    }
  </style>
</head>
<body>

  <header>
    <h1>John Doe</h1>
    <p>Web Developer Portfolio</p>
  </header>

  <nav>
    <a href="#">About</a>
    <a href="#">Projects</a>
    <a href="#">Contact</a>
  </nav>

  <div class="about">
    <h2>About Me</h2>
    <p>Hello! I'm a web developer who loves building beautiful websites.</p>
  </div>

  <div class="projects">
    <h2>My Projects</h2>
    <div class="cards">
      <div class="card">
        <h3>Project One</h3>
        <p>A simple HTML/CSS website.</p>
      </div>
      <div class="card">
        <h3>Project Two</h3>
        <p>Portfolio template with flexbox.</p>
      </div>
    </div>
  </div>

  <footer>
    &copy; 2025 John Doe | Contact: email@example.com
  </footer>

</body>
</html>
