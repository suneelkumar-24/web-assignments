<!DOCTYPE html>
<html>
<head>
  <title>Course Form</title>
  <style>
    #courseForm {
      width: 300px;
      padding: 15px;
      background-color: #e0ffe0;
      border: 1px solid green;
    }

    h2 {
      text-align: center;
      color: darkgreen;
    }

    .label-block {
      display: block;
      margin: 10px 0;
    }
  </style>
</head>
<body>
  <div id="courseForm">
    <h2>Select Courses</h2>
    <form>
      <label class="label-block">
        <input type="checkbox" name="course"> HTML
      </label>
      <label class="label-block">
        <input type="checkbox" name="course"> CSS
      </label>
      <label class="label-block">
        <input type="checkbox" name="course"> JavaScript
      </label>
      <label class="label-block">
        <input type="checkbox" name="course"> Python
      </label>
    </form>
  </div>
</body>
</html>
