<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhotoSnap</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://kit.fontawesome.com/db76b74b4c.js" crossorigin="anonymous"></script>
</head>
<body>

  <!-- Header -->
  <header class="topbar">
    <h1 class="logo"><i class="fas fa-camera-retro"></i> PhotoSnap</h1>
    <div class="socials">
      <a href="#"><i class="fab fa-instagram"></i></a>
      <a href="#"><i class="fab fa-facebook"></i></a>
      <a href="#"><i class="fab fa-twitter"></i></a>
    </div>
  </header>

  <!-- Hero -->
  <section class="hero">
    <div class="overlay"></div>
    <div class="hero-text">
      <h2>Capturing Moments, Creating Memories</h2>
      <p>Photography by Professionals</p>
    </div>
  </section>

  <!-- Gallery -->
  <section class="gallery">
    <h2>My Portfolio</h2>
    <div class="grid">
      <img src="https://picsum.photos/id/1015/400/300" alt="photo">
      <img src="https://picsum.photos/id/1016/400/300" alt="photo">
      <img src="https://picsum.photos/id/1018/400/300" alt="photo">
      <img src="https://picsum.photos/id/1020/400/300" alt="photo">
      <img src="https://picsum.photos/id/1024/400/300" alt="photo">
      <img src="https://picsum.photos/id/1027/400/300" alt="photo">
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <p>&copy; 2025 PhotoSnap | Designed for Practice</p>
  </footer>

</body>
</html>
