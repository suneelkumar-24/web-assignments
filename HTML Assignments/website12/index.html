<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Foodies Restaurant</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://kit.fontawesome.com/db76b74b4c.js" crossorigin="anonymous"></script>
</head>
<body>

  <!-- Navbar -->
  <header>
    <nav class="navbar">
      <h2 class="logo">Foodies</h2>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="menu.html">Menu</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <!-- Hero -->
  <section class="hero">
    <div class="overlay"></div>
    <div class="hero-content">
      <h1>Welcome to Foodies Restaurant</h1>
      <p>Delicious meals made with love</p>
      <a href="menu.html" class="btn">View Menu</a>
    </div>
  </section>

  <!-- Services -->
  <section class="services">
    <h2>Our Specials</h2>
    <div class="service-cards">
      <div class="card">
        <i class="fas fa-pizza-slice"></i>
        <h3>Pizza</h3>
        <p>Hot and cheesy pizzas freshly baked.</p>
      </div>
      <div class="card">
        <i class="fas fa-hamburger"></i>
        <h3>Burgers</h3>
        <p>Juicy burgers with fresh ingredients.</p>
      </div>
      <div class="card">
        <i class="fas fa-ice-cream"></i>
        <h3>Desserts</h3>
        <p>Sweet treats to end your meal.</p>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <p>&copy; 2025 Foodies Restaurant</p>
    <div class="socials">
      <a href="#"><i class="fab fa-facebook"></i></a>
      <a href="#"><i class="fab fa-instagram"></i></a>
      <a href="#"><i class="fab fa-twitter"></i></a>
    </div>
  </footer>

</body>
</html>
