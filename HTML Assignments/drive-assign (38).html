<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Showcase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .product-card {
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }
        
        .product-card:hover {
            transform: translateY(-10px);
        }
        
        .product-img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            transition: opacity 0.3s ease;
        }
        
        .product-card:hover .product-img {
            opacity: 0.7;
        }
        
        .product-info {
            padding: 20px;
            background-color: #fff;
        }
        
        .product-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .product-price {
            font-size: 18px;
            font-weight: bold;
            color: #0d6efd;
            margin-bottom: 20px;
        }
        
        .btn-add-cart {
            border-radius: 50px;
            padding: 8px 20px;
        }
        
        .section-title {
            font-weight: 600;
            margin-bottom: 40px;
        }
    </style>
</head>

<body class="bg-light py-5">

    <div class="container">
        <h2 class="text-center section-title">Our Products</h2>
        <div class="row g-4">
            <!-- Product 1 -->
            <div class="col-md-4">
                <div class="product-card">
                    <img src="img.jpg" alt="Product Image" class="product-img">
                    <div class="product-info">
                        <h5 class="product-title">Product 1</h5>
                        <p class="product-price">$99.99</p>
                        <button class="btn btn-primary btn-add-cart">Add to Cart</button>
                    </div>
                </div>
            </div>

            <!-- Product 2 -->
            <div class="col-md-4">
                <div class="product-card">
                    <img src="img.jpg" alt="Product Image" class="product-img">
                    <div class="product-info">
                        <h5 class="product-title">Product 2</h5>
                        <p class="product-price">$149.99</p>
                        <button class="btn btn-primary btn-add-cart">Add to Cart</button>
                    </div>
                </div>
            </div>

            <!-- Product 3 -->
            <div class="col-md-4">
                <div class="product-card">
                    <img src="img.jpg" alt="Product Image" class="product-img">
                    <div class="product-info">
                        <h5 class="product-title">Product 3</h5>
                        <p class="product-price">$199.99</p>
                        <button class="btn btn-primary btn-add-cart">Add to Cart</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
