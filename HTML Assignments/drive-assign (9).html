<!DOCTYPE html>
<html>
<head>
    <title>Color Boxes</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f0f0;
            padding: 20px;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            max-width: 300px;
            margin: 0 auto;
        }
        .box {
            width: 80px;
            height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            border-radius: 5px;
        }
        .box-1 { background: #ff6b6b; }
        .box-2 { background: #48dbfb; }
        .box-3 { background: #1dd1a1; }
        .box-4 { background: #feca57; }
    </style>
</head>
<body>
    <div class="container">
        <div class="box box-1">1</div>
        <div class="box box-2">2</div>
        <div class="box box-3">3</div>
        <div class="box box-4">4</div>
    </div>
</body>
</html>
