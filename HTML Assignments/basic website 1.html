<!DOCTYPE html>
<html>
<head>
  <title>Google Clone</title>
  <style>
    body {
      text-align: center;
      background-color: white;
      font-family: Arial;
    }

    h1 {
      color: #4285F4;
      font-size: 50px;
    }

    input[type="text"] {
      width: 300px;
      height: 30px;
      border: 1px solid #ccc;
    }

    button {
      background-color: #f8f9fa;
      border: 1px solid #dcdcdc;
      color: black;
      font-size: 14px;
    }

    a {
      color: #1a0dab;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <!-- Top Links -->
  <div>
    <a href="#">Gmail</a> | 
    <a href="#">Images</a>
  </div>

  <!-- Logo -->
  <h1>Google</h1>

  <!-- Search Box -->
  <input type="text"><br><br>

  <!-- Buttons -->
  <button>Google Search</button>
  <button>I’m Feeling Lucky</button>

</body>
</html>
