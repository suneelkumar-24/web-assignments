<!DOCTYPE html>
<html>
<head>
  <title>Intentional Overrides</title>
  <style>
    h1 {
      color: red;
    }

    #header {
      color: green; /* Overrides tag styling */
    }
  </style>
</head>
<body>
  <h1>This is normal H1 tag (red)</h1>
  <h1 id="header">This is ID-based H1 (green)</h1>
</body>
</html>
