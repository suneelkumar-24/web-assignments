<!DOCTYPE html>
<html>
<head>
  <title>Profile Card</title>
  <style>
    #profile {
      background-color: #f0f0f0;
      padding: 20px;
      width: 300px;
      border: 1px solid #ccc;
    }

    #name {
      font-size: 24px;
      color: darkblue;
    }

    #bio {
      color: gray;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div id="profile">
    <h2 id="name">Suneel Kumar</h2>
    <p id="bio">A passionate web developer.</p>
  </div>
</body>
</html>
