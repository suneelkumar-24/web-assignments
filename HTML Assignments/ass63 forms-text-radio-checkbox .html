<!DOCTYPE html>
<html>
<head>
  <title>Quiz</title>
  <style>
    body {
      font-family: Arial;
      background-color: #fff3cd;
    }

    #quizBox {
      background-color: #fff;
      padding: 20px;
      border: 1px solid orange;
      width: 400px;
      margin: auto;
    }

    .question {
      margin-bottom: 15px;
    }
  </style>
</head>
<body>
  <div id="quizBox">
    <h2>Q1. What does HTML stand for?</h2>
    <form>
      <div class="question">
        <label><input type="radio" name="q1"> Hyper Text Markup Language</label><br>
        <label><input type="radio" name="q1"> Hyperlinks Text Makeup Language</label><br>
        <label><input type="radio" name="q1"> Home Tool Markup Language</label><br>
        <label><input type="radio" name="q1"> None of these</label>
      </div>
    </form>
  </div>
</body>
</html>
