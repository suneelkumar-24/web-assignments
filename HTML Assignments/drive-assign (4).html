<!DOCTYPE html>
<html>
  <head>
    <title>Simple Profile Card</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        display: flex;
        justify-content: center;  
        align-items: center;
        height: 100vh;
        margin: 0;
      }

      .profile-card {
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        text-align: center;
        width: 250px;
      }

      .profile-card img {
        border-radius: 50%;
        margin: 10px 0;
      }

      .profile-card h1 {
        color: #333;
        margin: 0;
      }

      .profile-card p {
        color: #666;
        margin: 5px 0;
      }
    </style>
  </head>
  <body>
    <div class="profile-card">
      <h1>John Doe</h1>
      <p>Web Development Student</p>
      <img src="pic1.jpeg" alt="Profile Image"  height="200px" width="200px"/>
      <p>I love coding and playing guitar!</p>
    </div>
  </body>
</html>
