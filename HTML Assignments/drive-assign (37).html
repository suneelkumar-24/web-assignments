<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pricing Table</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .pricing-card {
            border-radius: 15px;
            padding: 30px;
            background-color: #fff;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            text-align: center;
            transition: transform 0.3s ease;
        }
        
        .pricing-card:hover {
            transform: translateY(-5px);
        }
        
        .plan-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .plan-price {
            font-size: 36px;
            font-weight: bold;
            color: #0d6efd;
            margin-bottom: 20px;
        }
        
        .plan-features {
            list-style: none;
            padding: 0;
            margin-bottom: 25px;
        }
        
        .plan-features li {
            margin: 10px 0;
        }
        
        .btn-plan {
            border-radius: 50px;
        }
        
        .section-title {
            font-weight: 600;
            margin-bottom: 40px;
        }
    </style>
</head>

<body class="bg-light py-5">

    <div class="container">
        <h2 class="text-center section-title">Our Pricing Plans</h2>
        <div class="row g-4">
            <!-- Basic Plan -->
            <div class="col-md-4">
                <div class="pricing-card">
                    <div class="plan-title">Basic</div>
                    <div class="plan-price">$9/mo</div>
                    <ul class="plan-features text-muted">
                        <li>1 Website</li>
                        <li>10 GB Storage</li>
                        <li>Email Support</li>
                    </ul>
                    <button class="btn btn-outline-primary btn-plan px-4">Choose Plan</button>
                </div>
            </div>

            <!-- Standard Plan -->
            <div class="col-md-4">
                <div class="pricing-card">
                    <div class="plan-title">Standard</div>
                    <div class="plan-price">$29/mo</div>
                    <ul class="plan-features text-muted">
                        <li>5 Websites</li>
                        <li>50 GB Storage</li>
                        <li>Priority Support</li>
                    </ul>
                    <button class="btn btn-primary btn-plan px-4">Choose Plan</button>
                </div>
            </div>

            <!-- Premium Plan -->
            <div class="col-md-4">
                <div class="pricing-card">
                    <div class="plan-title">Premium</div>
                    <div class="plan-price">$49/mo</div>
                    <ul class="plan-features text-muted">
                        <li>Unlimited Websites</li>
                        <li>200 GB Storage</li>
                        <li>24/7 Support</li>
                    </ul>
                    <button class="btn btn-outline-primary btn-plan px-4">Choose Plan</button>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
