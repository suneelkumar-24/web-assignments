<!DOCTYPE html>
<html>
<head>
  <title>Feedback</title>
  <style>
    #feedbackForm {
      background-color: #f9f9f9;
      border: 2px solid #ccc;
      width: 450px;
      padding: 20px;
      font-family: Verdana;
    }

    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="feedbackForm">
    <h2>Website Feedback</h2>
    <form>
      <label>Name:</label>
      <input type="text"><br>

      <label>Email:</label>
      <input type="email"><br>

      <label>Was the website helpful?</label>
      <input type="radio" name="helpful"> Yes
      <input type="radio" name="helpful"> No<br>

      <label>Which features did you use?</label>
      <input type="checkbox"> Search
      <input type="checkbox"> Forms
      <input type="checkbox"> Articles
    </form>
  </div>
</body>
</html>
