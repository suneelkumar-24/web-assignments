<!DOCTYPE html>
<html>
<head>
  <title>Restaurant Menu</title>
  <style>
    body {
      text-align: center;
      background-color: #fff3e0;
      font-family: Arial;
    }
    h1 {
      color: #e65100;
    }
    h2 {
      color: #bf360c;
    }
    p {
      color: #444;
      font-size: 18px;
    }
    button {
      background-color: #e65100;
      color: white;
      border: 1px solid black;
    }
    button:hover {
      background-color: #ff7043;
    }
  </style>
</head>
<body>
  <h1>Delicious Bites</h1>
  <h2>Our Menu</h2>
  <p>Pizza - $10</p>
  <p>Burger - $7</p>
  <p>Pasta - $8</p>
  <button>Order Now</button>
</body>
</html>
