<!DOCTYPE html>
<html>
<head>
  <title>Contact Card</title>
  <style>
    body {
      font-family: sans-serif;
      background-color: #fffbea;
      padding: 30px;
    }
    .contact-card {
      border: 1px solid gray;
      padding: 15px;
      width: 250px;
    }
    h2 {
      color: green;
    }
  </style>
</head>
<body>
  <div class="contact-card">
    <h2>Ali Khan</h2>
    <p>Email: ali@example.com</p>
    <p>Phone: 123-456-7890</p>
  </div>
</body>
</html>
