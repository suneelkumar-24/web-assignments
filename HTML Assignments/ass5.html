<!DOCTYPE html>
<html>
<head>
  <title>Lists Example</title>
</head>
<body>
  <h2>Fruits (Unordered)</h2>

    <li>Apple</li>
    <li>Banana</li>
    <li>Mango</li>
  </ul>

  <h2>Top 3 Movies (Ordered)</h2>

    <li>The Matrix</li>
  </ol>
</body>
</html>
