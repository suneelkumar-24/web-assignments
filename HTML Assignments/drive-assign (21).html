<!DOCTYPE html>
<html>
<head>
    <title>Pricing Table</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f5f5f5;
            padding: 20px;
        }
        .pricing-table {
            display: flex;
            gap: 20px;
        }
        .pricing-card {
            background: white;
            border-radius: 10px;
            padding: 30px;
            width: 200px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        .pricing-card:hover {
            transform: translateY(-10px);
        }
        .price {
            font-size: 36px;
            font-weight: bold;
            margin: 20px 0;
            color: #4b6cb7;
        }
        .plan-name {
            font-size: 20px;
            color: #333;
        }
        .features {
            list-style: none;
            padding: 0;
            margin: 20px 0;
        }
        .features li {
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }
        .btn {
            background: #4b6cb7;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="pricing-table">
        <div class="pricing-card">
            <div class="plan-name">Basic</div>
            <div class="price">$9.99</div>
            <ul class="features">
                <li>10 Projects</li>
                <li>5GB Storage</li>
                <li>Basic Support</li>
            </ul>
            <button class="btn">Get Started</button>
        </div>
    </div>
</body>
</html>
