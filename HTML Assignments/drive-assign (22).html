<!DOCTYPE html>
<html>
<head>
    <title>Progress Bar</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f5f5f5;
        }
        .progress-container {
            width: 300px;
            margin: 20px 0;
        }
        .progress-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }
        .progress-bar {
            height: 20px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 65%;
            background: linear-gradient(to right, #4b6cb7, #3a56a0);
            border-radius: 10px;
            animation: fill 2s ease-in-out;
        }
        @keyframes fill {
            from { width: 0%; }
            to { width: 65%; }
        }
    </style>
</head>
<body>
    <div class="progress-container">
        <div class="progress-label">
            <span>Project Completion</span>
            <span>65%</span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
    </div>
</body>
</html>
