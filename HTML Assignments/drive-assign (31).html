<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pricing Table</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
</head>

<body class="bg-light py-5">

    <div class="container">
        <h2 class="text-center mb-5">Choose Your Plan</h2>
        <div class="row g-4">
            <!-- Basic Plan -->
            <div class="col-md-4">
                <div class="card h-100 text-center p-4 shadow-sm border-0">
                    <h4 class="mb-3">Basic</h4>
                    <h2 class="text-primary">$9<span class="fs-6">/mo</span></h2>
                    <ul class="list-unstyled my-3">
                        <li>✔ 1 Project</li>
                        <li>✔ 5 GB Storage</li>
                        <li>✔ Basic Support</li>
                    </ul>
                    <a href="#" class="btn btn-outline-primary rounded-pill">Get Started</a>
                </div>
            </div>

            <!-- Pro Plan -->
            <div class="col-md-4">
                <div class="card h-100 text-center p-4 shadow-sm border-0">
                    <h4 class="mb-3">Pro</h4>
                    <h2 class="text-success">$29<span class="fs-6">/mo</span></h2>
                    <ul class="list-unstyled my-3">
                        <li>✔ 10 Projects</li>
                        <li>✔ 50 GB Storage</li>
                        <li>✔ Priority Support</li>
                    </ul>
                    <a href="#" class="btn btn-success rounded-pill">Get Started</a>
                </div>
            </div>

            <!-- Enterprise Plan -->
            <div class="col-md-4">
                <div class="card h-100 text-center p-4 shadow-sm border-0">
                    <h4 class="mb-3">Enterprise</h4>
                    <h2 class="text-dark">$99<span class="fs-6">/mo</span></h2>
                    <ul class="list-unstyled my-3">
                        <li>✔ Unlimited Projects</li>
                        <li>✔ 1 TB Storage</li>
                        <li>✔ 24/7 Support</li>
                    </ul>
                    <a href="#" class="btn btn-dark rounded-pill">Get Started</a>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
