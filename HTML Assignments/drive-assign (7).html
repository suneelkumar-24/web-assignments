<!DOCTYPE html>
<html>
<head>
    <title>Button Effects</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f7f7f7;
        }
        .btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 24px;
            margin: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }
        .btn:hover {
            background: #45a049;
            transform: scale(1.05);
        }
        .btn:active {
            background: #3e8e41;
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <button class="btn">Click Me</button>
    <button class="btn">Hover Me</button>
</body>
</html>
