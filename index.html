<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard | Login & Task Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #0f172a;
            min-height: 100vh;
        }

        /* Login Page Styles */
        .login-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .login-card {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(10px);
            padding: 2.5rem;
            border-radius: 1.5rem;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(56,189,248,0.3);
        }

        .login-card h2 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #38bdf8, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
        }

        .login-card p {
            color: #94a3b8;
            text-align: center;
            margin-bottom: 2rem;
        }

        .input-group {
            margin-bottom: 1.2rem;
        }

        .input-group label {
            display: block;
            color: #cbd5e1;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .input-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 0.75rem;
            color: white;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56,189,248,0.2);
        }

        .login-btn {
            width: 100%;
            padding: 0.75rem;
            background: #38bdf8;
            border: none;
            border-radius: 0.75rem;
            font-size: 1rem;
            font-weight: bold;
            color: #0f172a;
            cursor: pointer;
            margin-top: 1rem;
            transition: transform 0.2s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            background: #7dd3fc;
        }

        .error-msg {
            color: #f87171;
            font-size: 0.85rem;
            margin-top: 1rem;
            text-align: center;
        }

        /* Dashboard Styles */
        .dashboard {
            display: none;
        }

        header {
            background: #1e293b;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            border-bottom: 1px solid #334155;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, #facc15, #38bdf8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .username-badge {
            background: #0f172a;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            font-size: 0.9rem;
        }

        .logout-btn {
            background: #ef4444;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .logout-btn:hover {
            background: #dc2626;
        }

        .container {
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .stats-bar {
            background: #1e293b;
            border-radius: 1rem;
            padding: 1rem 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .stats-text {
            font-size: 1.1rem;
        }

        .stats-percent {
            font-size: 1.5rem;
            font-weight: bold;
            color: #38bdf8;
        }

        .reset-btn {
            background: #334155;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        .reset-btn:hover {
            background: #475569;
        }

        h2 {
            margin: 2rem 0 1rem 0;
            font-size: 1.5rem;
            border-left: 4px solid #38bdf8;
            padding-left: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .category-progress {
            font-size: 0.85rem;
            background: #1e293b;
            padding: 0.3rem 0.8rem;
            border-radius: 2rem;
            font-weight: normal;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .task-card {
            background: #1e293b;
            border-radius: 0.75rem;
            padding: 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s;
            border: 1px solid #334155;
        }

        .task-card:hover {
            background: #334155;
            transform: translateY(-2px);
        }

        .task-link {
            text-decoration: none;
            color: #f1f5f9;
            font-weight: 500;
            flex: 1;
            padding: 0.5rem;
            border-radius: 0.5rem;
            transition: 0.2s;
        }

        .task-link:hover {
            color: #38bdf8;
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .checkbox-wrapper label {
            cursor: pointer;
            font-size: 0.85rem;
            color: #cbd5e1;
        }

        .task-checkbox {
            width: 1.2rem;
            height: 1.2rem;
            cursor: pointer;
            accent-color: #38bdf8;
        }

        footer {
            text-align: center;
            padding: 1.5rem;
            background: #1e293b;
            margin-top: 3rem;
            color: #94a3b8;
        }

        footer a {
            color: #facc15;
            text-decoration: none;
        }

        @media (max-width: 640px) {
            .container {
                padding: 1rem;
            }
            header {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>

<!-- Login Page -->
<div id="loginPage" class="login-page">
    <div class="login-card">
        <h2>📚 TaskFlow</h2>
        <p>Login to track your assignments</p>
        <div class="input-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Enter username" autocomplete="off">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter password">
        </div>
        <button class="login-btn" onclick="handleLogin()">Login →</button>
        <div id="loginError" class="error-msg"></div>
    </div>
</div>

<!-- Dashboard -->
<div id="dashboard" class="dashboard">
    <header>
        <div class="logo">📊 Web Assignments Dashboard</div>
        <div class="user-info">
            <span class="username-badge" id="currentUsername">User</span>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </header>

    <div class="container">
        <div class="stats-bar">
            <div>
                <span class="stats-text">📈 Overall Progress</span>
                <div class="stats-percent" id="overallPercent">0%</div>
            </div>
            <div>
                <span id="completedCount">0</span> / <span id="totalCount">0</span> tasks completed
            </div>
            <button class="reset-btn" onclick="resetAllProgress()">Reset All Progress</button>
        </div>

        <h2>📄 HTML Assignments <span class="category-progress" id="htmlProgress">0%</span></h2>
        <div id="htmlGrid" class="grid"></div>

        <h2>⚡ JavaScript Tasks <span class="category-progress" id="jsProgress">0%</span></h2>
        <div id="jsGrid" class="grid"></div>

        <h2>💻 Programming Practice <span class="category-progress" id="progProgress">0%</span></h2>
        <div id="progGrid" class="grid"></div>
    </div>

    <footer>
        Made by <a href="#">Sir Suneel</a> | Track your learning journey ✅
    </footer>
</div>

<script>
    // ==================== USERS DATABASE (Fixed - Plain Text) ====================
    const USERS = [
        { username: "adrish", password: "asdf1234" },
        { username: "mubashar", password: "asdf1234" },
        { username: "suneel", password: "asdf1234" },
        { username: "vikram", password: "vikram123" },
        { username: "pardeep", password: "password123" },
        { username: "tushal", password: "umerkot123" },
        { username: "narender", password: "school123" },
        { username: "saroop", password: "umerkot123" },
        { username: "anand", password: "umerkot123" },
        { username: "papu", password: "umerkot123" },
        { username: "motiram", password: "umerkot123" },
        { username: "saqib", password: "sug99" },
        { username: "lajpat", password: "lajpatrai" },
        { username: "dileep", password: "dileep123" },
        { username: "zahid", password: "mirporkhas123" }
    ];

    // ==================== SAMPLE ASSIGNMENTS (Fallback if data.json missing) ====================
    const DEFAULT_ASSIGNMENTS = {
        html: [
            "HTML Assignments/assignment1.html",
            "HTML Assignments/assignment2.html",
            "HTML Assignments/assignment3.html"
        ],
        js: [
            "Javascript assignments/task1.html",
            "Javascript assignments/task2.html",
            "Javascript assignments/task3.html"
        ],
        programming: [
            { name: "Program 1 - Variables", path: "Progarmming Assignment/program1.txt" },
            { name: "Program 2 - Loops", path: "Progarmming Assignment/program2.txt" },
            { name: "Program 3 - Functions", path: "Progarmming Assignment/program3.txt" }
        ]
    };

    // ==================== GLOBAL VARIABLES ====================
    let currentUser = null;
    let assignmentsData = { html: [], js: [], programming: [] };
    let userProgress = {};
    let allTasks = [];

    // ==================== LOAD DATA FROM data.json ====================
    async function loadAssignments() {
        try {
            const response = await fetch('data.json');
            if (response.ok) {
                const data = await response.json();
                assignmentsData = data;
            } else {
                console.log("data.json not found, using default assignments");
                assignmentsData = DEFAULT_ASSIGNMENTS;
            }
        } catch (error) {
            console.log("Error loading data.json, using default assignments");
            assignmentsData = DEFAULT_ASSIGNMENTS;
        }
        buildTasksList();
        renderDashboard();
    }

    // ==================== BUILD FLAT TASKS LIST ====================
    function buildTasksList() {
        allTasks = [];
        
        // HTML assignments
        if (assignmentsData.html && Array.isArray(assignmentsData.html)) {
            assignmentsData.html.forEach((path, idx) => {
                const displayName = getDisplayNameFromPath(path, 'html', idx);
                allTasks.push({
                    id: `html_${idx}`,
                    category: 'html',
                    displayName: displayName,
                    path: path,
                    originalIndex: idx
                });
            });
        }
        
        // JS assignments
        if (assignmentsData.js && Array.isArray(assignmentsData.js)) {
            assignmentsData.js.forEach((path, idx) => {
                const displayName = getDisplayNameFromPath(path, 'js', idx);
                allTasks.push({
                    id: `js_${idx}`,
                    category: 'js',
                    displayName: displayName,
                    path: path,
                    originalIndex: idx
                });
            });
        }
        
        // Programming assignments
        if (assignmentsData.programming && Array.isArray(assignmentsData.programming)) {
            assignmentsData.programming.forEach((item, idx) => {
                const displayName = item.name || `Program ${idx + 1}`;
                allTasks.push({
                    id: `prog_${idx}`,
                    category: 'programming',
                    displayName: displayName,
                    path: item.path,
                    originalIndex: idx,
                    rawItem: item
                });
            });
        }
    }

    function getDisplayNameFromPath(path, type, idx) {
        if (!path) return `Task ${idx + 1}`;
        const fileName = path.split('/').pop();
        if (type === 'html') {
            return fileName.replace('.html', '').replace(/_/g, ' ').substring(0, 35);
        } else if (type === 'js') {
            return fileName.replace('.html', '').replace(/_/g, ' ');
        }
        return `Task ${idx + 1}`;
    }

    // ==================== PROGRESS STORAGE ====================
    function loadUserProgress() {
        if (!currentUser) return {};
        const storageKey = `task_progress_${currentUser.username}`;
        const saved = localStorage.getItem(storageKey);
        if (saved) {
            userProgress = JSON.parse(saved);
        } else {
            userProgress = {};
        }
    }

    function saveUserProgress() {
        if (!currentUser) return;
        const storageKey = `task_progress_${currentUser.username}`;
        localStorage.setItem(storageKey, JSON.stringify(userProgress));
    }

    function toggleTask(taskId, isChecked) {
        if (isChecked) {
            userProgress[taskId] = true;
        } else {
            delete userProgress[taskId];
        }
        saveUserProgress();
        renderDashboard();
    }

    function resetAllProgress() {
        if (confirm('Are you sure you want to reset all your progress? This cannot be undone.')) {
            userProgress = {};
            saveUserProgress();
            renderDashboard();
        }
    }

    // ==================== PROGRESS CALCULATIONS ====================
    function getCategoryProgress(category) {
        const categoryTasks = allTasks.filter(t => t.category === category);
        if (categoryTasks.length === 0) return 0;
        const completed = categoryTasks.filter(t => userProgress[t.id] === true).length;
        return Math.round((completed / categoryTasks.length) * 100);
    }

    function getOverallProgress() {
        if (allTasks.length === 0) return 0;
        const completed = allTasks.filter(t => userProgress[t.id] === true).length;
        return Math.round((completed / allTasks.length) * 100);
    }

    function getCompletedCount() {
        return allTasks.filter(t => userProgress[t.id] === true).length;
    }

    // ==================== RENDER DASHBOARD ====================
    function renderDashboard() {
        if (!currentUser) return;
        
        document.getElementById('overallPercent').textContent = `${getOverallProgress()}%`;
        document.getElementById('completedCount').textContent = getCompletedCount();
        document.getElementById('totalCount').textContent = allTasks.length;
        
        document.getElementById('htmlProgress').textContent = `${getCategoryProgress('html')}%`;
        document.getElementById('jsProgress').textContent = `${getCategoryProgress('js')}%`;
        document.getElementById('progProgress').textContent = `${getCategoryProgress('programming')}%`;
        
        renderCategoryGrid('html', 'htmlGrid');
        renderCategoryGrid('js', 'jsGrid');
        renderCategoryGrid('programming', 'progGrid');
    }
    
    function renderCategoryGrid(category, containerId) {
        const container = document.getElementById(containerId);
        if (!container) return;
        
        const categoryTasks = allTasks.filter(t => t.category === category);
        
        if (categoryTasks.length === 0) {
            container.innerHTML = '<div style="color: #64748b; padding: 2rem; text-align: center;">No assignments found</div>';
            return;
        }
        
        container.innerHTML = '';
        
        categoryTasks.forEach(task => {
            const isCompleted = userProgress[task.id] === true;
            
            const card = document.createElement('div');
            card.className = 'task-card';
            
            const link = document.createElement('a');
            link.href = task.path;
            link.target = '_blank';
            link.className = 'task-link';
            link.textContent = task.displayName;
            
            const checkboxDiv = document.createElement('div');
            checkboxDiv.className = 'checkbox-wrapper';
            
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.className = 'task-checkbox';
            checkbox.checked = isCompleted;
            checkbox.onchange = (e) => {
                e.stopPropagation();
                toggleTask(task.id, checkbox.checked);
            };
            
            const label = document.createElement('label');
            label.textContent = 'Complete';
            label.style.cursor = 'pointer';
            label.onclick = (e) => {
                e.stopPropagation();
                checkbox.checked = !checkbox.checked;
                toggleTask(task.id, checkbox.checked);
            };
            
            checkboxDiv.appendChild(checkbox);
            checkboxDiv.appendChild(label);
            
            card.appendChild(link);
            card.appendChild(checkboxDiv);
            container.appendChild(card);
        });
    }

    // ==================== LOGIN FUNCTION (FIXED) ====================
    function handleLogin() {
        const username = document.getElementById('username').value.trim().toLowerCase();
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('loginError');
        
        if (!username || !password) {
            errorDiv.textContent = 'Please enter username and password';
            return;
        }
        
        // Find user with matching credentials
        const user = USERS.find(u => u.username === username && u.password === password);
        
        if (user) {
            currentUser = { username: user.username };
            document.getElementById('currentUsername').textContent = `👤 ${currentUser.username}`;
            
            loadUserProgress();
            
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            
            loadAssignments();
        } else {
            errorDiv.textContent = 'Invalid username or password';
        }
    }
    
    function logout() {
        currentUser = null;
        userProgress = {};
        allTasks = [];
        
        document.getElementById('loginPage').style.display = 'flex';
        document.getElementById('dashboard').style.display = 'none';
        
        document.getElementById('username').value = '';
        document.getElementById('password').value = '';
        document.getElementById('loginError').textContent = '';
    }
 
    
    
    // Allow Enter key to login
    document.getElementById('password')?.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleLogin();
    });
    document.getElementById('username')?.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleLogin();
    });
</script>
</body>
</html>
